services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
        NEXT_PUBLIC_CRONOFY_CLIENT_ID: ${NEXT_PUBLIC_CRONOFY_CLIENT_ID:-}
        NEXT_PUBLIC_CRONOFY_REDIRECT_URI: ${NEXT_PUBLIC_CRONOFY_REDIRECT_URI:-}
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
